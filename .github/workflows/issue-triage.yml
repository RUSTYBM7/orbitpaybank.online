name: Issue Triage

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened]

jobs:
  triage:
    name: Add to Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add to GitHub Project
        uses: actions/add-to-project@v2
        with:
          project-url: https://github.com/users/RUSTYBM7/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}

  label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Labeler
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-delete: true
