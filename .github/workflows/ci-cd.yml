name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # Don't block deploy on lint warnings

  build-member:
    name: Build Member Portal
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build member portal
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload member build
        uses: actions/upload-artifact@v4
        with:
          name: dist-member
          path: dist/
          retention-days: 7

  build-admin:
    name: Build Admin Portal
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install admin deps
        working-directory: admin-portal
        run: npm ci

      - name: Build admin portal
        working-directory: admin-portal
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload admin build
        uses: actions/upload-artifact@v4
        with:
          name: dist-admin
          path: admin-portal/dist/
          retention-days: 7

  deploy-member:
    name: Deploy Member Portal to Vercel
    runs-on: ubuntu-latest
    needs: build-member
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (user-portal)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_MEMBER }}
          vercel-args: '--prod'
          working-directory: ./

  deploy-admin:
    name: Deploy Admin Portal to Vercel
    runs-on: ubuntu-latest
    needs: build-admin
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (admin-portal)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args: '--prod'
          working-directory: admin-portal

  notify:
    name: Notify Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-member, deploy-admin]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Member deploy: ${{ needs.deploy-member.result }}"
          echo "Admin deploy:  ${{ needs.deploy-admin.result }}"