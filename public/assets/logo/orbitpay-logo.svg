<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0A1F"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B46C1"/>
      <stop offset="50%" stop-color="#4B0082"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941F"/>
    </linearGradient>
  </defs>

  <!-- Mark: stylized "O" with orbital rings -->
  <g transform="translate(20, 20)">
    <!-- Background disc -->
    <circle cx="80" cy="80" r="78" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="3"/>
    <!-- Inner orb -->
    <circle cx="80" cy="80" r="40" fill="url(#markGrad)"/>
    <!-- Orbital rings -->
    <ellipse cx="80" cy="80" rx="68" ry="22" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.85" transform="rotate(-25 80 80)"/>
    <ellipse cx="80" cy="80" rx="58" ry="18" fill="none" stroke="#6B46C1" stroke-width="1.5" opacity="0.7" transform="rotate(35 80 80)"/>
    <!-- Center node -->
    <circle cx="80" cy="80" r="6" fill="#D4AF37"/>
    <!-- Letter O overlay -->
    <text x="80" y="100" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" text-anchor="middle" fill="#FFFFFF" letter-spacing="-2">OP</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(200, 0)">
    <text x="0" y="110" font-family="Inter, -apple-system, sans-serif" font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-2">OrbitPay</text>
    <text x="2" y="148" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#D4AF37" letter-spacing="6">CREDIT UNION</text>
    <!-- Accent line -->
    <line x1="0" y1="160" x2="200" y2="160" stroke="url(#ringGrad)" stroke-width="2"/>
  </g>
</svg>