<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0A1F"/>
      <stop offset="50%" stop-color="#1A1530"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B46C1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6B46C1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow center -->
  <circle cx="600" cy="315" r="400" fill="url(#glow)"/>

  <!-- Orbital rings -->
  <ellipse cx="600" cy="315" rx="500" ry="120" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4" transform="rotate(-15 600 315)"/>
  <ellipse cx="600" cy="315" rx="450" ry="100" fill="none" stroke="#6B46C1" stroke-width="1.5" opacity="0.5" transform="rotate(25 600 315)"/>
  <ellipse cx="600" cy="315" rx="380" ry="80" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3" transform="rotate(-40 600 315)"/>

  <!-- Mark in center -->
  <g transform="translate(450, 145)">
    <circle cx="150" cy="150" r="140" fill="#1A1530" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="150" cy="150" r="80" fill="url(#bg)"/>
    <text x="150" y="180" font-family="Inter, -apple-system, sans-serif" font-size="110" font-weight="800" text-anchor="middle" fill="url(#gold)" letter-spacing="-4">OP</text>
  </g>

  <!-- Wordmark below -->
  <g transform="translate(600, 460)">
    <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="92" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">OrbitPay</text>
    <text x="0" y="48" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#D4AF37" text-anchor="middle" letter-spacing="10">CREDIT UNION</text>
    <line x1="-200" y1="68" x2="200" y2="68" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="100" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#B8B0D0" text-anchor="middle" letter-spacing="2">Banking Without Borders · Since 1952</text>
  </g>
</svg>