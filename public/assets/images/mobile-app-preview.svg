<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0A1F"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B46C1"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
  </defs>

  <!-- Phone outline -->
  <rect x="20" y="20" width="360" height="760" rx="40" fill="url(#phoneBg)" stroke="#4B0082" stroke-width="3"/>

  <!-- Status bar -->
  <text x="50" y="60" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">9:41</text>
  <circle cx="330" cy="55" r="3" fill="#D4AF37"/>
  <circle cx="340" cy="55" r="3" fill="#D4AF37"/>
  <circle cx="350" cy="55" r="3" fill="#D4AF37"/>

  <!-- App header -->
  <text x="50" y="120" font-family="Inter, sans-serif" font-size="14" fill="#B8B0D0">Good morning, Aisha</text>
  <text x="50" y="155" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">$24,580.50</text>
  <text x="50" y="180" font-family="Inter, sans-serif" font-size="12" fill="#B8B0D0">Available balance · USD</text>

  <!-- Card -->
  <g transform="translate(35, 220)">
    <rect width="330" height="200" rx="20" fill="url(#cardGrad)" stroke="#D4AF37" stroke-width="2"/>
    <text x="20" y="40" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#D4AF37">ORBITPAY PLATINUM</text>
    <text x="20" y="100" font-family="monospace" font-size="22" font-weight="700" fill="#FFFFFF">•••• •••• •••• 4729</text>
    <text x="20" y="160" font-family="Inter, sans-serif" font-size="10" fill="#B8B0D0">CARDHOLDER</text>
    <text x="20" y="180" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">AISHA OKORO</text>
    <text x="270" y="180" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">12/28</text>
  </g>

  <!-- Quick actions -->
  <g transform="translate(50, 460)">
    <g><circle cx="30" cy="30" r="28" fill="#6B46C1"/><text x="30" y="40" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#FFFFFF">⇄</text><text x="30" y="80" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#B8B0D0">Send</text></g>
    <g transform="translate(100, 0)"><circle cx="30" cy="30" r="28" fill="#4B0082"/><text x="30" y="40" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#FFFFFF">+</text><text x="30" y="80" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#B8B0D0">Add</text></g>
    <g transform="translate(200, 0)"><circle cx="30" cy="30" r="28" fill="#1A1530" stroke="#D4AF37" stroke-width="2"/><text x="30" y="40" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#D4AF37">$</text><text x="30" y="80" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#B8B0D0">Pay</text></g>
    <g transform="translate(300, 0)"><circle cx="30" cy="30" r="28" fill="#1A1530" stroke="#4B0082" stroke-width="2"/><text x="30" y="40" font-family="Inter, sans-serif" font-size="20" text-anchor="middle" fill="#B8B0D0">↗</text><text x="30" y="80" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#B8B0D0">Invest</text></g>
  </g>

  <!-- Recent activity -->
  <g transform="translate(35, 580)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Recent Activity</text>
    <g transform="translate(0, 30)">
      <circle cx="20" cy="20" r="16" fill="#6B46C1" opacity="0.3"/>
      <text x="50" y="18" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Salary</text>
      <text x="50" y="34" font-family="Inter, sans-serif" font-size="11" fill="#B8B0D0">Today, 9:00am</text>
      <text x="295" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#10B981" text-anchor="end">+$3,200.00</text>
    </g>
    <g transform="translate(0, 80)">
      <circle cx="20" cy="20" r="16" fill="#4B0082" opacity="0.3"/>
      <text x="50" y="18" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Amazon</text>
      <text x="50" y="34" font-family="Inter, sans-serif" font-size="11" fill="#B8B0D0">Yesterday</text>
      <text x="295" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#EF4444" text-anchor="end">-$149.99</text>
    </g>
  </g>
</svg>